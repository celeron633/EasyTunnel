name: Build EasyTunnel (MSVC)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-msvc:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake + MSVC)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release (console + GUI)
        run: |
          cmake --build build --config Release --target EasyTunnel
          cmake --build build --config Release --target EasyTunnel_gui

      - name: Package EasyTunnel release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist/EasyTunnel | Out-Null

          Copy-Item "build/Release/EasyTunnel.exe" "dist/EasyTunnel/EasyTunnel.exe" -Force
          Copy-Item "build/Release/EasyTunnel_gui.exe" "dist/EasyTunnel/EasyTunnel_gui.exe" -Force

          if (Test-Path "build/Release/wintun.dll") {
            Copy-Item "build/Release/wintun.dll" "dist/EasyTunnel/wintun.dll" -Force
          }

          if (Test-Path "conf/tunnel.conf.example") {
            Copy-Item "conf/tunnel.conf.example" "dist/EasyTunnel/tunnel.conf.example" -Force
          }

          if (Test-Path "README.md") {
            Copy-Item "README.md" "dist/EasyTunnel/README.md" -Force
          }

          if (Test-Path "dist/EasyTunnel.zip") {
            Remove-Item "dist/EasyTunnel.zip" -Force
          }

          Compress-Archive -Path "dist/EasyTunnel/*" -DestinationPath "dist/EasyTunnel.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTunnel-release
          path: dist/EasyTunnel.zip

      - name: Upload tag build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EasyTunnel.zip
