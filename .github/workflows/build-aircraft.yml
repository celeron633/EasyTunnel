name: Build 6Tunnel (MSVC)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-msvc:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake + MSVC)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        run: cmake --build build --config Release --target 6tunnel

      - name: Package 6tunnel release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist/6tunnel | Out-Null

          Copy-Item "build/Release/6tunnel.exe" "dist/6tunnel/6tunnel.exe" -Force

          if (Test-Path "build/Release/wintun.dll") {
            Copy-Item "build/Release/wintun.dll" "dist/6tunnel/wintun.dll" -Force
          }

          if (Test-Path "conf/tunnel.conf.example") {
            Copy-Item "conf/tunnel.conf.example" "dist/6tunnel/tunnel.conf.example" -Force
          }

          if (Test-Path "README.md") {
            Copy-Item "README.md" "dist/6tunnel/README.md" -Force
          }

          if (Test-Path "dist/6tunnel.zip") {
            Remove-Item "dist/6tunnel.zip" -Force
          }

          Compress-Archive -Path "dist/6tunnel/*" -DestinationPath "dist/6tunnel.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 6tunnel-release
          path: dist/6tunnel.zip

      - name: Upload tag build to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/6tunnel.zip
